name: Render & Deploy Character Sheet

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"

      - name: Install R packages
        run: Rscript -e 'install.packages(c("yaml", "knitr", "rmarkdown"), repos = "https://cloud.r-project.org")'

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "release"

      - name: Install WeasyPrint
        run: |
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b
          pip install weasyprint

      - name: Render HTML + PDF
        run: quarto render index.qmd

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: character-sheet-pdf
          path: _output/index.pdf

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _output

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: render
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
